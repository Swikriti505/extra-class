<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Box Model</title>
    <style>
    *{
        margin: 0;
        padding: 0;
   }
   .box{
    width: 200px;
    height: 200px;
    background-color: yellow;
    margin: 10px;
    padding: 5px;
    border: 10px solid red;
   }
   .box:hover{
    background-color:rgb(188, 41, 78);
    CURSOR: pointer;
    border: 10px solid black;
    transition: 0.5s;
   }
        </style>

</head>
<body>
    <div class="box">
        Hello, CCT CSIT 2nd Semester!
        <h1> SHENA DIDI</h1>
        <h2>Namaste!</h2>
        <h2/h2>
    </div>
    
</body>
</html>
