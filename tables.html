<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> table and nested table</title>
</head>
<body>
    <h2> Row Span and Col Span:</h2>
    <table border="1">
        <tr>
           <td colspan="2"><b>Class Routine</b></td>
        
        </tr>
        <tr>
            <th>Day</th>
            <th>Subject</th>
        </tr>
        <tr>
            <td> Sunday</td>
            <td> Statistics</td>
        </tr>
        <tr>
            <td> Monday</td>
            <td> Maths</td>
        </tr>
        <tr>
            <td> Tuesday</td>
            <td rowspan="2"> Microprocessor</td>
        </tr>
        <tr>
            <td> Wednesday</td>
        </tr>
    </table>
    
</body>
</html>
